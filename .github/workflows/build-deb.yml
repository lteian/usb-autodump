name: Build Linux DEB (统信/麒麟)

on:
  push:
    branches: [main, cpp]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y qtbase5-dev qtchooser qt5-qmake cmake build-essential dpkg wget

      - name: Configure & Build
        run: |
          mkdir -p build && cd build
          cmake ..
          cmake --build . --config Release

      - name: Package DEB
        run: |
          PKG=/tmp/usb-autodump-pkg
          rm -rf $PKG
          mkdir -p $PKG/DEBIAN
          mkdir -p $PKG/usr/local/bin
          mkdir -p $PKG/usr/share/applications
          # Find the actual binary under build/dist/*/
          BINARY=$(find build/dist -name 'usb-autodump' -type f 2>/dev/null | head -1)
          if [ -z "$BINARY" ]; then
            echo "ERROR: usb-autodump binary not found in build/dist"
            exit 1
          fi
          cp "$BINARY" $PKG/usr/local/bin/usb-autodump
          chmod 755 $PKG/usr/local/bin/usb-autodump
          cp linux/usb-autodump.desktop $PKG/usr/share/applications/usb-autodump.desktop
          chmod 644 $PKG/usr/share/applications/usb-autodump.desktop
          mkdir -p dist
          printf 'Package: usb-autodump\nVersion: 1.0.0\nSection: utils\nPriority: optional\nArchitecture: amd64\nMaintainer: lteian\nDescription: USB auto dump tool\n' > $PKG/DEBIAN/control
          printf '#!/bin/bash\nupdate-desktop-database /usr/share/applications/ 2>/dev/null || true\n' > $PKG/DEBIAN/postinst
          chmod 755 $PKG/DEBIAN/postinst
          dpkg-deb --build $PKG dist/usb-autodump_1.0.0_amd64.deb
          ls -lh dist/usb-autodump_1.0.0_amd64.deb

      - uses: actions/upload-artifact@v4
        with:
          name: usb-autodump-DEB
          path: dist/usb-autodump_1.0.0_amd64.deb
          retention-days: 30
