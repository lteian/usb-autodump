name: Build Linux DEB (统信/麒麟)

on:
  push:
    branches: [main, cpp]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y qtbase5-dev qtchooser qt5-qmake cmake build-essential dpkg wget

      - name: Configure & Build
        run: |
          mkdir -p build && cd build
          cmake ..
          cmake --build . --config Release

      - name: Install linuxdeployqt
        run: |
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage -O /tmp/linuxdeployqt
          chmod +x /tmp/linuxdeployqt
          wget -q https://github.com/staticlibs/desktop-file-utils/releases/download/continuous/desktop-file-utils-continuous-x86_64.AppImage -O /tmp/desktop-file-utils
          chmod +x /tmp/desktop-file-utils

      - name: Bundle Qt libs with linuxdeployqt
        env:
          QMake: /usr/lib/qt5/bin/qmake
        run: |
          cd /tmp
          # Set up Qt plugins path
          export QT_QPA_PLATFORM=minimal
          # Bundle the binary and all Qt dependencies into a temp dir
          /tmp/linuxdeployqt /home/runner/work/usb-autodump/usb-autodump/dist/*/usb-autodump \
            -unsupported-allow-new-glibc \
            -no-translations \
            -no-strip \
            -appimage-extract-and-run 2>&1 | tail -20
          echo "--- linuxdeployqt done ---"
          ls -la /home/runner/work/usb-autodump/usb-autodump/dist/*/ 2>/dev/null || echo "dist not found"

      - name: Package DEB with fpm
        run: |
          sudo apt-get install -y ruby ruby-dev rubygems build-essential
          sudo gem install fpm --no-document

          PKG=/tmp/usb-autodump-pkg
          rm -rf $PKG
          mkdir -p $PKG/DEBIAN
          mkdir -p $PKG/usr/local/bin
          mkdir -p $PKG/usr/share/applications
          mkdir -p $PKG/usr/local/lib

          # Find the bundled AppRun or the binary directory
          BUNDLE_DIR=$(find /home/runner/work/usb-autodump/usb-autodump/dist -name 'squashfs-root' -type d 2>/dev/null | head -1)
          if [ -n "$BUNDLE_DIR" ]; then
            # linuxdeployqt created an AppDir
            cp -r "$BUNDLE_DIR/usr/local/bin/"* $PKG/usr/local/bin/ 2>/dev/null || true
            cp -r "$BUNDLE_DIR/usr/local/lib/"* $PKG/usr/local/lib/ 2>/dev/null || true
            # The main binary is in AppRun
            if [ -f "$BUNDLE_DIR/AppRun" ]; then
              cp "$BUNDLE_DIR/AppRun" $PKG/usr/local/bin/usb-autodump
              chmod 755 $PKG/usr/local/bin/usb-autodump
            fi
          fi

          # Fallback: just use the original binary if bundle didn't work
          if [ ! -f $PKG/usr/local/bin/usb-autodump ]; then
            BINARY=$(find /home/runner/work/usb-autodump/usb-autodump/dist -name 'usb-autodump' -type f 2>/dev/null | head -1)
            cp "$BINARY" $PKG/usr/local/bin/usb-autodump
            chmod 755 $PKG/usr/local/bin/usb-autodump
          fi

          cp /home/runner/work/usb-autodump/usb-autodump/linux/usb-autodump.desktop $PKG/usr/share/applications/usb-autodump.desktop
          chmod 644 $PKG/usr/share/applications/usb-autodump.desktop

          # Copy icon if exists
          if [ -f /home/runner/work/usb-autodump/usb-autodump/icon.svg ]; then
            mkdir -p $PKG/usr/share/icons/hicolor/scalable/apps
            cp /home/runner/work/usb-autodump/usb-autodump/icon.svg $PKG/usr/share/icons/hicolor/scalable/apps/usb-autodump.svg
          fi

          mkdir -p dist
          fpm -s dir -t deb \
            -n usb-autodump \
            -v 1.0.0 \
            -C $PKG \
            -p dist/usb-autodump_1.0.0_amd64.deb \
            --deb-description "USB auto dump tool for UFS video file transfer with FTP upload" \
            --maintainer "lteian" \
            --url "https://github.com/lteian/usb-autodump" \
            --license "MIT" \
            usr/

          ls -lh dist/usb-autodump_1.0.0_amd64.deb

      - uses: actions/upload-artifact@v4
        with:
          name: usb-autodump-DEB
          path: dist/usb-autodump_1.0.0_amd64.deb
          retention-days: 30
