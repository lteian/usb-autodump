name: Build Linux DEB (统信/麒麟)

on:
  push:
    branches: [main, cpp]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y qtbase5-dev qtchooser qt5-qmake cmake build-essential dpkg ruby ruby-dev rubygems
          sudo gem install fpm --no-document

      - name: Configure & Build
        run: |
          QT5_PREFIX=$(dpkg -L qtbase5-dev 2>/dev/null | grep 'cmake/Qt5' | sed 's|/cmake/Qt5||' | head -1)
          if [ -z "$QT5_PREFIX" ]; then QT5_PREFIX="/usr/lib/x86_64-linux-gnu"; fi
          echo "Qt5 prefix: $QT5_PREFIX"
          mkdir -p build && cd build
          cmake .. -DCMAKE_PREFIX_PATH="$QT5_PREFIX"
          cmake --build . --config Release

      - name: Package DEB
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          set -x
          PKG=/tmp/usb-autodump-pkg
          # Use tag version if available, otherwise 1.0.0
          if [[ "$TAG_VERSION" =~ ^v ]]; then
            VERSION="${TAG_VERSION#v}"
          else
            VERSION="1.0.0"
          fi
          echo "Package version: $VERSION"
          echo "PKG_VERSION=$VERSION" >> $GITHUB_ENV
          rm -rf $PKG
          mkdir -p $PKG/usr/local/bin
          mkdir -p $PKG/usr/local/lib
          mkdir -p $PKG/usr/local/lib/qt5/plugins/iconengines
          mkdir -p $PKG/usr/local/lib/qt5/plugins/imageformats
          mkdir -p $PKG/usr/local/lib/qt5/plugins/platforms
          mkdir -p $PKG/usr/share/applications
          mkdir -p $PKG/usr/share/icons/hicolor/scalable/apps

          # Find binary (try build/dist first, then dist/<date>)
          BINARY=$(find ${{ github.workspace }}/build/dist -name 'usb-autodump' -type f 2>/dev/null | head -1)
          if [ -z "$BINARY" ]; then
            BINARY=$(find ${{ github.workspace }}/dist -name 'usb-autodump' -type f 2>/dev/null | head -1)
          fi
          if [ -z "$BINARY" ]; then
            echo "ERROR: usb-autodump binary not found"
            echo "Contents of build/dist:"
            find ${{ github.workspace }}/build/dist -type f 2>/dev/null || echo "(empty)"
            echo "Contents of dist:"
            find ${{ github.workspace }}/dist -type f 2>/dev/null || echo "(empty)"
            exit 1
          fi
          echo "Binary: $BINARY"
          cp "$BINARY" $PKG/usr/local/bin/usb-autodump
          chmod 755 $PKG/usr/local/bin/usb-autodump

          # Copy Qt plugins (required at runtime)
          cp -n /usr/lib/x86_64-linux-gnu/qt5/plugins/iconengines/*.so $PKG/usr/local/lib/qt5/plugins/iconengines/ 2>/dev/null || true
          cp -n /usr/lib/x86_64-linux-gnu/qt5/plugins/imageformats/*.so $PKG/usr/local/lib/qt5/plugins/imageformats/ 2>/dev/null || true
          cp -n /usr/lib/x86_64-linux-gnu/qt5/plugins/platforms/*.so $PKG/usr/local/lib/qt5/plugins/platforms/ 2>/dev/null || true

          # Copy all libs required by the binary (from ldd)
          LIBS=$(ldd "$BINARY" 2>/dev/null | awk '{print $3}' | grep '^/' | grep -v 'not' | sort -u)
          for lib in $LIBS; do
            if [ -f "$lib" ]; then
              fname=$(basename "$lib")
              cp -n "$lib" "$PKG/usr/local/lib/$fname" 2>/dev/null || true
            fi
          done

          # Also copy Qt plugin libs that may not appear in ldd (loaded via QPluginLoader)
          for plugin_dir in /usr/lib/x86_64-linux-gnu/qt5/plugins/*/; do
            plugin_name=$(basename "$plugin_dir")
            for solib in "$plugin_dir"*.so; do
              [ -f "$solib" ] || continue
              fname=$(basename "$solib")
              target_dir="$PKG/usr/local/lib/qt5/plugins/$plugin_name"
              mkdir -p "$target_dir"
              cp -n "$solib" "$target_dir/$fname" 2>/dev/null || true
            done
          done

          chmod 644 $PKG/usr/local/bin/usb-autodump
          cp ${{ github.workspace }}/linux/usb-autodump.desktop $PKG/usr/share/applications/usb-autodump.desktop
          chmod 644 $PKG/usr/share/applications/usb-autodump.desktop

          if [ -f ${{ github.workspace }}/icon.svg ]; then
            cp ${{ github.workspace }}/icon.svg $PKG/usr/share/icons/hicolor/scalable/apps/usb-autodump.svg
          fi

          echo "=== Package contents ==="
          find $PKG/usr/local/lib -name "*.so*" | head -40

          mkdir -p dist
          fpm -s dir -t deb \
            -n usb-autodump \
            -v $VERSION \
            -C $PKG \
            -p dist/usb-autodump_${VERSION}_amd64.deb \
            --description "USB auto dump tool for UFS video file transfer with FTP upload" \
            --maintainer "lteian" \
            --url "https://github.com/lteian/usb-autodump" \
            --license "MIT" \
            --category "utils" \
            usr/

          ls -lh dist/usb-autodump_${VERSION}_amd64.deb

          echo "=== DEB contents (libs) ==="
          dpkg -c dist/usb-autodump_${VERSION}_amd64.deb | grep -E "\.so" | head -40

      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/usb-autodump_${{ env.PKG_VERSION }}_amd64.deb
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: usb-autodump-DEB-${{ env.PKG_VERSION }}
          path: dist/usb-autodump_${{ env.PKG_VERSION }}_amd64.deb
          retention-days: 30
