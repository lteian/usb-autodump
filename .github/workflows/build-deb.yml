name: Build Linux DEB (统信/麒麟)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-pyudev ruby ruby-dev rubygems
          sudo gem install fpm --no-document

      - name: Install Python packages
        run: |
          pip install PyQt6 cryptography pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name "usb-autodump" main.py
          mkdir -p dist/deb_root/usr/local/bin/
          mkdir -p dist/deb_root/usr/share/applications/
          mkdir -p dist/deb_root/usr/share/icons/hicolor/256x256/apps/
          cp dist/usb-autodump dist/deb_root/usr/local/bin/usb-autodump
          cp linux/usb-autodump.desktop dist/deb_root/usr/share/applications/

          # 生成一个简单 PNG icon（256x256 橙色方块）
          python3 -c "
from PIL import Image, ImageDraw
img = Image.new('RGB', (256, 256), color='#1e1e1e')
draw = ImageDraw.Draw(img)
draw.ellipse([30, 30, 226, 226], fill='#FF9800', outline='#e65100', width=4)
draw.rectangle([100, 80, 156, 110], fill='white')
draw.rectangle([100, 115, 156, 140], fill='white')
img.save('dist/deb_root/usr/share/icons/hicolor/256x256/apps/usb-autodump.png')
" 2>/dev/null || echo "PIL not available, skipping icon"

      - name: Package DEB
        run: |
          fpm -s dir -t deb \
            -n usb-autodump \
            -v 1.0.0 \
            --vendor "lteian" \
            --maintainer "lteian" \
            --description "USB自动转储工具 - 支持统信UOS/麒麟Kylin" \
            --category Utility \
            -p dist/usb-autodump_1.0.0_amd64.deb \
            -f \
            dist/deb_root

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: usb-autodump-DEB
          path: dist/usb-autodump_1.0.0_amd64.deb
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/usb-autodump_1.0.0_amd64.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
