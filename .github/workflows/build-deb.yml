name: Build Linux DEB (统信/麒麟)

on:
  push:
    branches: [main, cpp]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt5-default qtbase5-dev cmake build-essential dpkg wget

      - name: Configure & Build
        run: |
          mkdir -p build && cd build
          cmake ..
          cmake --build . --config Release

      - name: Package DEB with dpkg-deb
        run: |
          PKG=/tmp/usb-autodump-pkg
          rm -rf $PKG

          mkdir -p $PKG/DEBIAN
          mkdir -p $PKG/usr/local/bin
          mkdir -p $PKG/usr/share/applications

          cp build/usb-autodump $PKG/usr/local/bin/usb-autodump
          chmod 755 $PKG/usr/local/bin/usb-autodump

          cp linux/usb-autodump.desktop $PKG/usr/share/applications/usb-autodump.desktop
          chmod 644 $PKG/usr/share/applications/usb-autodump.desktop

          cat > $PKG/DEBIAN/control << 'CTRL'
Package: usb-autodump
Version: 1.0.0
Section: utils
Priority: optional
Architecture: amd64
Maintainer: lteian
Description: USB自动转储工具
  支持U盘自动检测、视频转储、FTP上传、格式化弹出
CTRL

          cat > $PKG/DEBIAN/postinst << 'POST'
#!/bin/bash
update-desktop-database /usr/share/applications/ 2>/dev/null || true
POST
          chmod 755 $PKG/DEBIAN/postinst

          dpkg-deb --build $PKG dist/usb-autodump_1.0.0_amd64.deb 2>&1
          ls -lh dist/usb-autodump_1.0.0_amd64.deb

      - uses: actions/upload-artifact@v4
        with:
          name: usb-autodump-DEB
          path: dist/usb-autodump_1.0.0_amd64.deb
          retention-days: 30
