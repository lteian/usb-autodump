name: Build Linux DEB (统信/麒麟)

on:
  push:
    branches: [main, cpp]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y qtbase5-dev qtchooser qt5-qmake cmake build-essential dpkg wget ruby ruby-dev rubygems build-essential
          sudo gem install fpm --no-document
          # Debug: verify Qt5 cmake files exist
          find /usr -name "Qt5Config.cmake" 2>/dev/null
          dpkg -L qtbase5-dev | grep -E "cmake|pri" | head -10

      - name: Configure & Build
        run: |
          # Find Qt5 cmake files
          QT5_PREFIX=$(dpkg -L qtbase5-dev 2>/dev/null | grep 'cmake/Qt5' | sed 's|/cmake/Qt5||' | head -1)
          if [ -z "$QT5_PREFIX" ]; then QT5_PREFIX="/usr/lib/x86_64-linux-gnu"; fi
          echo "Qt5 prefix: $QT5_PREFIX"
          mkdir -p build && cd build
          cmake .. -DCMAKE_PREFIX_PATH="$QT5_PREFIX"
          cmake --build . --config Release

      - name: Install linuxdeployqt
        run: |
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage -O /tmp/linuxdeployqt
          chmod +x /tmp/linuxdeployqt
          wget -q https://github.com/staticlibs/desktop-file-utils/releases/download/continuous/desktop-file-utils-continuous-x86_64.AppImage -O /tmp/desktop-file-utils
          chmod +x /tmp/desktop-file-utils

      - name: Bundle Qt libs with linuxdeployqt
        env:
          QMake: /usr/lib/qt5/bin/qmake
        run: |
          cd ${{ github.workspace }}
          export QT_QPA_PLATFORM=minimal
          export LD_LIBRARY_PATH=${{ github.workspace }}/build/dist/*/:$LD_LIBRARY_PATH 2>/dev/null || true
          BINARY=$(find build/dist -name 'usb-autodump' -type f 2>/dev/null | head -1)
          if [ -z "$BINARY" ]; then
            BINARY=$(find dist -name 'usb-autodump' -type f 2>/dev/null | head -1)
          fi
          if [ -z "$BINARY" ]; then
            echo "ERROR: usb-autodump binary not found"
            exit 1
          fi
          echo "Found binary: $BINARY"

          # Create a temp AppDir for linuxdeployqt
          APPDIR=/tmp/usb-autodump-appdir
          rm -rf $APPDIR
          mkdir -p $APPDIR/usr/bin
          cp "$BINARY" $APPDIR/usr/bin/usb-autodump
          chmod 755 $APPDIR/usr/bin/usb-autodump

          # Copy desktop and icon
          mkdir -p $APPDIR/usr/share/applications
          cp linux/usb-autodump.desktop $APPDIR/usr/share/applications/usb-autodump.desktop
          if [ -f icon.svg ]; then
            mkdir -p $APPDIR/usr/share/icons/hicolor/scalable/apps
            cp icon.svg $APPDIR/usr/share/icons/hicolor/scalable/apps/usb-autodump.svg
          fi

          cd /tmp
          export LD_LIBRARY_PATH=$APPDIR/usr/bin:$LD_LIBRARY_PATH
          /tmp/linuxdeployqt $APPDIR/usr/bin/usb-autodump \
            -unsupported-allow-new-glibc \
            -no-translations \
            -no-strip \
            -appimage-extract-and-run 2>&1 | tail -30

          echo "--- linuxdeployqt done ---"
          ls -la $APPDIR/usr/bin/ 2>/dev/null || echo "No usr/bin"
          find $APPDIR -name "*.so*" 2>/dev/null | head -20

      - name: Package DEB with fpm
        run: |
          set -x
          PKG=/tmp/usb-autodump-pkg
          APPDIR=/tmp/usb-autodump-appdir

          # Verify AppDir structure
          echo "=== AppDir contents ==="
          find $APPDIR -type f | head -30
          echo "=== libs ==="
          find $APPDIR -name "*.so*" | head -30

          rm -rf $PKG
          mkdir -p $PKG/usr/local/bin
          mkdir -p $PKG/usr/local/lib
          mkdir -p $PKG/usr/share/applications
          mkdir -p $PKG/usr/share/icons/hicolor/scalable/apps

          # Copy binary
          if [ -f "$APPDIR/usr/bin/usb-autodump" ]; then
            cp $APPDIR/usr/bin/usb-autodump $PKG/usr/local/bin/
          else
            echo "ERROR: binary not in AppDir"
            exit 1
          fi

          # Copy ALL libs from AppDir (preserve dir structure under usr/)
          if [ -d "$APPDIR/usr" ]; then
            cp -rn $APPDIR/usr/lib/* $PKG/usr/local/lib/ 2>/dev/null || true
            cp -rn $APPDIR/usr/lib64/* $PKG/usr/local/lib/ 2>/dev/null || true
          fi

          # Fallback: if linuxdeployqt didn't populate libs, copy from build
          if [ ! "$(ls -A $PKG/usr/local/lib/*.so* 2>/dev/null)" ]; then
            echo "WARNING: no libs in AppDir, trying build dir"
            for f in $(find ${{ github.workspace }}/build -name "*.so*" -type f 2>/dev/null); do
              cp "$f" $PKG/usr/local/lib/
            done
          fi

          chmod 755 $PKG/usr/local/bin/usb-autodump
          cp ${{ github.workspace }}/linux/usb-autodump.desktop $PKG/usr/share/applications/usb-autodump.desktop
          chmod 644 $PKG/usr/share/applications/usb-autodump.desktop

          if [ -f ${{ github.workspace }}/icon.svg ]; then
            cp ${{ github.workspace }}/icon.svg $PKG/usr/share/icons/hicolor/scalable/apps/usb-autodump.svg
          fi

          echo "=== Package contents ==="
          find $PKG -type f | head -50

          mkdir -p dist
          fpm -s dir -t deb \
            -n usb-autodump \
            -v 1.0.0 \
            -C $PKG \
            -p dist/usb-autodump_1.0.0_amd64.deb \
            --deb-description "USB auto dump tool for UFS video file transfer with FTP upload" \
            --maintainer "lteian" \
            --url "https://github.com/lteian/usb-autodump" \
            --license "MIT" \
            usr/

          ls -lh dist/usb-autodump_1.0.0_amd64.deb

          echo "=== DEB contents ==="
          dpkg -c dist/usb-autodump_1.0.0_amd64.deb | grep -E "so|lib|bin"

      - uses: actions/upload-artifact@v4
        with:
          name: usb-autodump-DEB
          path: dist/usb-autodump_1.0.0_amd64.deb
          retention-days: 30
