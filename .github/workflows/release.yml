name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: mingw-w64-x86_64-qt5-base mingw-w64-x86_64-qt5-tools

      - name: Configure CMake
        shell: msys2 {0}
        run: |
          echo "=== Checking Qt5 Installation ==="
          ls -la /mingw64/lib/cmake/ 2>/dev/null | head -20 || echo "No cmake dir found"
          ls -la /mingw64/bin/qmake.exe 2>/dev/null || echo "No qmake found"
          echo "=== Running cmake ==="
          mkdir -p build
          cmake -G "MinGW Makefiles" -B build -S . -DCMAKE_BUILD_TYPE=Release 2>&1

      - name: Build
        shell: msys2 {0}
        run: |
          cmake --build build --parallel

      - name: Deploy Qt DLLs
        shell: msys2 {0}
        run: |
          windeployqt.exe --no-translations build/usb-autodump.exe

      - name: Package
        shell: bash
        run: |
          mkdir -p dist/${{ github.ref_name }}
          cp build/usb-autodump.exe dist/${{ github.ref_name }}/
          cp /C/msys64/mingw64/bin/*.dll dist/${{ github.ref_name }}/ 2>/dev/null || true
          ls -la dist/${{ github.ref_name }}/

      - uses: softprops/action-gh-release@v1
        with:
          files: dist/${{ github.ref_name }}/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
