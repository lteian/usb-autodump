name: Release Synology Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: false
        type: string

env:
  PYTHON_VERSION: '3.11'

jobs:
  release-check:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.ver }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ -n "${{ github.ref_name }}" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v$(date +'%Y.%m.%d')"
          fi
          echo "ver=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

  create-release-package:
    needs: release-check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create release package
        id: package
        run: |
          VERSION="${{ needs.release-check.outputs.version }}"
          PKG_NAME="usb-autodump-${VERSION}"
          
          echo "Creating release package: ${PKG_NAME}"
          
          mkdir -p "release/${PKG_NAME}"
          
          # Copy all source files
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='build' \
            --exclude='*.egg-info' \
            --exclude='file_records.db' \
            --exclude='config.json' \
            . "release/${PKG_NAME}/"
          
          # Add version info
          echo "${VERSION}" > "release/${PKG_NAME}/VERSION"
          
          # Create tar.gz
          cd release
          tar -czvf "${PKG_NAME}-source.tar.gz" "${PKG_NAME}/"
          tar -czvf "${PKG_NAME}-synology-package.tar.gz" \
            --transform="s/${PKG_NAME}\///" \
            "${PKG_NAME}/"
          
          echo "pkgs=${PKG_NAME}-source.tar.gz,${PKG_NAME}-synology-package.tar.gz" >> $GITHUB_OUTPUT
          echo "pkg_name=${PKG_NAME}" >> $GITHUB_OUTPUT

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          path: release/*.tar.gz
          retention-days: 90

  create-github-release:
    needs: [release-check, create-release-package]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-packages
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log --oneline -20)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## Changes in ${{ needs.release-check.outputs.version }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo '```' >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo '```' >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Installation" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "See [README_SPK.md](https://github.com/${{ github.repository }}/blob/${{ needs.release-check.outputs.version }}/README_SPK.md) for Synology NAS installation instructions." >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-check.outputs.version }}
          name: Release ${{ needs.release-check.outputs.version }}
          body_path: artifacts/../changelog.txt
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/*-synology-package.tar.gz
            artifacts/*-source.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
