name: Build Windows EXE

on:
  push:
    branches: [web-version]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet PyQt6 pywin32 cryptography pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name usb-autodump main.py

      - name: Create output directory
        run: |
          mkdir -p dist
          cp dist/usb-autodump.exe dist/usb-autodump.exe || copy dist\usb-autodump.exe dist\

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: usb-autodump-Windows-EXE
          path: dist/usb-autodump.exe
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/usb-autodump.exe
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
