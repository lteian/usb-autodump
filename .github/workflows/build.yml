name: Build Windows EXE (Qt5)

on:
  push:
    branches: [main, cpp]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Qt5
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 5.15.2 win64_msvc2019_64 -O C:\Qt

      - name: Set Qt path
        run: |
          $qtBin = "C:\Qt\5.15.2\msvc2019_64\bin"
          if (!(Test-Path $qtBin)) {
            echo "ERROR: Qt bin path not found at $qtBin"
            Get-ChildItem C:\Qt\ 2>$null | ForEach-Object { echo $_.Name }
            exit 1
          }
          Add-Content $env:GITHUB_PATH $qtBin

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release ..

      - name: Build
        run: |
          cd build
          cmake --build . --config Release

      - name: Package
        run: |
          $exe = Get-ChildItem -Recurse -Filter "usb-autodump.exe" . | Select-Object -First 1 -ExpandProperty FullName
          if (!$exe) {
            echo "ERROR: usb-autodump.exe not found"
            exit 1
          }
          echo "Found exe at: $exe"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          windeployqt $exe --no-translations --no-webkit --no-compiler-runtime
          cp $exe dist/

      - uses: actions/upload-artifact@v4
        with:
          name: usb-autodump-EXE
          path: dist/usb-autodump.exe
          retention-days: 30
