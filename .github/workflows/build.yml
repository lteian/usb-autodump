name: Build Windows EXE (Qt5)

on:
  push:
    branches: [main, cpp]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Qt5
        run: |
          pip install aqtinstall
          aqt install-tool -O C:\Qt 5.15.2 win64_msvc2019_64

      - name: Set Qt path
        run: Add-Content $env:GITHUB_PATH "C:\Qt\5.15.2\win64_msvc2019_64\bin"

      - name: Configure CMake
        working-directory: build
        run: |
          mkdir build
          cmake -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release ..

      - name: Build
        working-directory: build
        run: cmake --build . --config Release

      - name: Package
        run: |
          mkdir dist
          windeployqt build/Release/usb-autodump.exe --no-translations --no-webkit --no-compiler-runtime
          cp build/Release/usb-autodump.exe dist/

      - uses: actions/upload-artifact@v4
        with:
          name: usb-autodump-EXE
          path: dist/usb-autodump.exe
          retention-days: 30
