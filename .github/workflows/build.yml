name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install PyQt6 pywin32 cryptography pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "USB自动转储工具" main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: USB自动转储工具-EXE
          path: dist/USB自动转储工具.exe
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/USB自动转储工具.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
